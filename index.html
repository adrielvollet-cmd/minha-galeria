<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria Gas Sales Piacenza</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #e30613; /* Vermelho característico do Piacenza */
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
            border-bottom: 3px solid #0054a6; /* Azul do time */
            padding-bottom: 10px;
        }

        .gallery-container {
            display: grid;
            /* Define 3 colunas de tamanhos iguais */
            grid-template-columns: repeat(3, 1fr);
            /* Define 6 linhas com altura de 250px */
            grid-template-rows: repeat(6, 250px);
            gap: 15px;
            max-width: 1000px;
            width: 100%;
        }

        .gallery-item {
            overflow: hidden;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            background-color: #ddd;
            position: relative;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
            display: block;
        }

        /* Efeito de hover (passar o mouse) */
        .gallery-item:hover img {
            transform: scale(1.1);
        }

        .gallery-item::after {
            content: "Piacenza Volley";
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(227, 6, 19, 0.7);
            color: white;
            padding: 5px;
            font-size: 12px;
            text-align: center;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .gallery-item:hover::after {
            opacity: 1;
        }

        /* Responsividade para telas menores */
        @media (max-width: 768px) {
            .gallery-container {
                grid-template-columns: repeat(2, 1fr);
                grid-template-rows: auto;
            }
        }

        @media (max-width: 480px) {
            .gallery-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <h1>Gas Sales Piacenza - Galeria</h1>

    <div class="gallery-container">
        <div class="gallery-item"><img src="https://volleybox.net/media/upload/roster_photo/1762083618kuqG5.png" alt="Piacenza 1"></div>
        <div class="gallery-item"><img src="https://via.placeholder.com/400x300?text=Jogador+2" alt="Piacenza 2"></div>
        <div class="gallery-item"><img src="https://via.placeholder.com/400x300?text=Jogador+3" alt="Piacenza 3"></div>
