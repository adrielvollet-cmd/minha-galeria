<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria Gas Sales Piacenza</title>
    <style>
        /* Estilização Geral */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        h1 {
            color: #d32f2f; /* Vermelho característico do Piacenza */
            text-transform: uppercase;
            border-bottom: 3px solid #d32f2f;
            padding-bottom: 10px;
        }

        /* Container da Galeria */
        .gallery {
            display: grid;
            /* Define 1 coluna fixa e 3 linhas */
            grid-template-columns: 1fr;
            grid-template-rows: repeat(3, auto);
            gap: 20px;
            max-width: 500px;
            width: 100%;
            margin-top: 20px;
        }

        /* Estilo dos itens da Galeria */
        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            background-color: #fff;
            transition: transform 0.3s ease;
        }

        .gallery-item:hover {
            transform: scale(1.03);
        }

        .gallery-item img {
            width: 100%;
            height: 300px;
            object-fit: cover; /* Mantém a proporção da foto sem distorcer */
            display: block;
        }

        .caption {
            padding: 15px;
            text-align: center;
            font-weight: bold;
            color: #333;
            background: white;
        }

        /* Responsividade para telas maiores (opcional) */
        @media (min-width: 768px) {
            .gallery {
                max-width: 400px;
            }
        }
    </style>
</head>
<body>

    <h1>Gas Sales Piacenza</h1>

    <div class="gallery">
        <div class="gallery-item">
            <img src="https://via.placeholder.com/500x300/d32f2f/ffffff?text=Jogador+1" alt="Jogador Piacenza 1">
            <div class="caption">Ataque Potente</div>
        </div>

        <div class="gallery-item">
            <img src="https://via.placeholder.com/500x300/d32f2f/ffffff?text=Jogador+2" alt="Jogador Piacenza 2">
            <div class="caption">Defesa e Recepção</div>
        </div>

        <div class="gallery-item">
            <img src="https://via.placeholder.com/500x300/d32f2f/ffffff?text=Jogador+3" alt="Jogador Piacenza 3">
            <div class="caption">Levantamento de Mestre</div>
        </div>
    </div>

</body>
</html>
