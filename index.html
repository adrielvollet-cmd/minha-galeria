<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria - Gas Sales Piacenza</title>
    <style>
        /* Estilização Geral */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        h1 {
            color: #e30613; /* Vermelho Piacenza */
            text-transform: uppercase;
            border-bottom: 3px solid #004595; /* Azul Piacenza */
            padding-bottom: 10px;
        }

        /* Container da Galeria */
        .gallery {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* 2 imagens por linha */
            grid-template-rows: repeat(3, auto);    /* 3 linhas */
            gap: 20px;
            max-width: 800px;
            width: 100%;
            margin-top: 20px;
        }

        /* Estilo dos Cards de Imagem */
        .image-card {
            background: #fff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }

        .image-card:hover {
            transform: scale(1.03);
        }

        .image-card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            display: block;
        }

        .caption {
            padding: 15px;
            text-align: center;
            font-weight: bold;
            color: #333;
            background: #fff;
        }

        /* Responsividade para celulares */
        @media (max-width: 600px) {
            .gallery {
                grid-template-columns: 1fr; /* Vira 1 coluna em telas pequenas */
            }
        }
    </style>
</head>
<body>

    <h1>Gas Sales Piacenza - Galeria</h1>

    <div class="gallery">
        <div class="image-card">
            <img src="https://via.placeholder.com/400x300?text=Ataque+Piacenza" alt="Ação de Jogo">
            <div class="caption">Poder de Ataque</div>
        </div>
        <div class="image-card">
            <img src="https://via.placeholder.com/400x300?text=Defesa+Piacenza" alt="Defesa">
            <div class="caption">Muralha Defensiva</div>
        </div>

        <div class="image-card">
            <img src="https://via.placeholder.com/400x300?text=Torcida" alt="Torcida">
            <div class="caption">Apoio da Torcida</div>
        </div>
        <div class="image-card">
            <img src="https://via.placeholder.com/400x300?text=Treinamento" alt="Treino">
            <div class="caption">Foco no Treino</div>
        </div>

        <div class="image-card">
            <img src="https://via.placeholder.com/400x300?text=Vitoria" alt="Comemoração">
            <div class="caption">Espírito de Equipe</div>
        </div>
        <div class="image-card">
            <img src="https://via.placeholder.com/400x300?text=Mascote" alt="Mascote">
            <div class="caption">Identidade</div>
        </div>
    </div>

</body>
</html>
